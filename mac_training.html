<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac 培训文档</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f2f2f7;
  --card: #fff;
  --primary: #0071e3;
  --primary-light: #e8f4fd;
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --border: #d2d2d7;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.06);
  --sidebar-w: 240px;
  --toolbar-h: 48px;
  --status-h: 32px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Toolbar */
.toolbar {
  height: var(--toolbar-h);
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 10;
}

.toolbar .spacer { flex: 1; }

.toolbar .doc-title-input {
  border: none;
  background: transparent;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  width: 200px;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background .15s;
}
.toolbar .doc-title-input:focus { background: var(--bg); }

.tb-btn {
  height: 32px;
  padding: 0 12px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: all .15s;
  background: transparent;
  color: var(--text);
}
.tb-btn:hover { background: #e5e5ea; }
.tb-btn.primary { background: var(--primary); color: #fff; }
.tb-btn.primary:hover { background: #0066cc; }
.tb-btn.danger { color: #ff3b30; }
.tb-btn.danger:hover { background: #ffe5e5; }

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  background: rgba(255,255,255,.7);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px 14px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.section-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
}

.section-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all .12s;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.section-item:hover { background: #e5e5ea; }
.section-item.active {
  background: var(--primary-light);
  border-color: var(--primary);
  font-weight: 600;
}

.section-item .sec-num {
  font-size: 10px;
  color: var(--text-secondary);
  min-width: 20px;
}

.section-item .sec-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.section-item .sec-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity .12s;
}
.section-item:hover .sec-actions,
.section-item.active .sec-actions { opacity: 1; }

.sec-act-btn {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
}
.sec-act-btn:hover { background: #d1d1d6; }
.sec-act-btn.danger:hover { background: #ffe5e5; color: #ff3b30; }

/* Editor */
.editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--card);
}

.editor-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 15px;
  user-select: none;
}

.editor-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.section-title-input {
  border: none;
  border-bottom: 1px solid var(--border);
  font-size: 22px;
  font-weight: 700;
  padding: 16px 24px;
  outline: none;
  font-family: inherit;
  color: var(--text);
  background: transparent;
}
.section-title-input::placeholder { color: #c4c4c8; }

/* Formatting bar */
.fmt-bar {
  display: flex;
  gap: 2px;
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.fmt-btn {
  width: 30px;
  height: 28px;
  border: none;
  border-radius: 4px;
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all .12s;
  position: relative;
}
.fmt-btn:hover { background: #e5e5ea; color: var(--text); }
.fmt-btn.active { background: var(--primary-light); color: var(--primary); }
.fmt-btn[title]::after { content: attr(title); position: absolute; bottom: -18px; font-size: 9px; white-space: nowrap; display: none; }

.fmt-divider {
  width: 1px;
  background: var(--border);
  margin: 4px 6px;
}

/* Content editable */
.content-editable {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  outline: none;
  font-size: 15px;
  line-height: 1.8;
}
.content-editable:empty::before {
  content: '在此编写内容...';
  color: #c4c4c8;
}

.content-editable h1 { font-size: 22px; margin: 12px 0 8px; }
.content-editable h2 { font-size: 18px; margin: 10px 0 6px; }
.content-editable h3 { font-size: 16px; margin: 8px 0 4px; }
.content-editable p { margin: 6px 0; }
.content-editable ul, .content-editable ol { margin: 6px 0; padding-left: 24px; }
.content-editable li { margin: 2px 0; }
.content-editable hr { margin: 16px 0; border: none; border-top: 1px solid var(--border); }
.content-editable strong { font-weight: 600; }
.content-editable b { font-weight: 600; }
.content-editable img {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  margin: 8px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.1);
  cursor: pointer;
}
.content-editable img:hover { outline: 2px solid var(--primary); outline-offset: 2px; }
.content-editable video {
  max-width: 100%;
  border-radius: 6px;
  margin: 8px 0;
  outline: none;
}
.content-editable iframe {
  max-width: 100%;
  border-radius: 6px;
  margin: 8px 0;
  aspect-ratio: 16/9;
  width: 100%;
  max-width: 640px;
  height: auto;
  border: 1px solid var(--border);
}
/* Click to select media for deletion */
.content-editable img.selected,
.content-editable video.selected,
.content-editable iframe.selected {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* Status bar */
.status-bar {
  height: var(--status-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 11px;
  color: var(--text-secondary);
  gap: 16px;
  flex-shrink: 0;
}

/* Print styles */
@media print {
  body { background: #fff; }
  .toolbar, .sidebar, .fmt-bar, .status-bar, .section-title-input { display: none !important; }
  .main { display: block; overflow: visible; }
  .editor-area { overflow: visible; }
  .editor-panel { overflow: visible; }
  .content-editable {
    padding: 0;
    font-size: 13px;
    line-height: 1.7;
  }
  .content-editable h1 { font-size: 20px; }
  .content-editable h2 { font-size: 16px; }
  .section-break { page-break-before: always; }
  .content-editable img { max-width: 100%; box-shadow: none; }
  .content-editable iframe { max-width: 100%; }
  .content-editable video { max-width: 100%; }
  @page { margin: 2cm; }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: #1d1d1f;
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.toast.show { opacity: 1; }

/* Mobile */
@media (max-width: 700px) {
  .sidebar { width: 160px; }
  .sidebar { display: none; }
  .sidebar.open { display: flex; position: absolute; top: var(--toolbar-h); left: 0; bottom: 0; z-index: 20; width: 220px; box-shadow: 2px 0 8px rgba(0,0,0,.1); }
  .section-title-input { font-size: 18px; padding: 12px 16px; }
  .content-editable { padding: 16px; font-size: 14px; }
  .tb-btn .tb-label { display: none; }
}
</style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <button class="tb-btn" onclick="toggleSidebar()" title="目录">☰</button>
  <input class="doc-title-input" id="docTitle" placeholder="培训文档标题" oninput="autoSave()">
  <span class="spacer"></span>
  <button class="tb-btn" onclick="addSection()"><span class="tb-label">+ 新增章节</span></button>
  <button class="tb-btn danger" onclick="deleteCurrentSection()"><span class="tb-label">🗑 删除章节</span></button>
  <button class="tb-btn" onclick="resetDoc()"><span class="tb-label">↺ 重置模板</span></button>
  <button class="tb-btn" onclick="exportPDF()" style="background:#0071e3;color:#fff;"><span class="tb-label">📄 导出 PDF</span></button>
  <button class="tb-btn" onclick="window.print()"><span class="tb-label">🖨 打印</span></button>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar open" id="sidebar">
    <div class="sidebar-header">
      <span>文档大纲</span>
      <span id="sectionCount">0 章节</span>
    </div>
    <div class="section-list" id="sectionList"></div>
  </div>

    <div class="editor-panel" id="editorPanel" style="display:none">
      <input class="section-title-input" id="sectionTitle" placeholder="章节标题" oninput="onSectionTitleChange()">
      <div class="fmt-bar">
        <button class="fmt-btn" title="标题1" data-cmd="formatBlock" data-val="h1"><b>H1</b></button>
        <button class="fmt-btn" title="标题2" data-cmd="formatBlock" data-val="h2"><b>H2</b></button>
        <button class="fmt-btn" title="标题3" data-cmd="formatBlock" data-val="h3"><b>H3</b></button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" title="加粗" data-cmd="bold"><b>B</b></button>
        <button class="fmt-btn" title="斜体" data-cmd="italic"><i>I</i></button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" title="左对齐" data-cmd="justifyLeft">≡◁</button>
        <button class="fmt-btn" title="居中" data-cmd="justifyCenter">≡</button>
        <button class="fmt-btn" title="右对齐" data-cmd="justifyRight">≡▷</button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" title="无序列表" data-cmd="insertUnorderedList">•≡</button>
        <button class="fmt-btn" title="有序列表" data-cmd="insertOrderedList">1≡</button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" title="分隔线" data-cmd="insertHorizontalRule">—</button>
        <span class="fmt-divider"></span>
        <button class="fmt-btn" onclick="insertImage()" title="插入本地图片">🖼</button>
        <button class="fmt-btn" onclick="insertImageURL()" title="插入图片链接">🖼🔗</button>
        <button class="fmt-btn" onclick="insertVideo()" title="插入视频(支持YouTube/B站)">🎬</button>
      </div>
      <div class="content-editable" id="contentEditable" contenteditable="true" oninput="onContentChange()"></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar">
  <span id="saveStatus">就绪</span>
  <span id="wordCount">0 字</span>
</div>

<!-- Hidden file input for image upload -->
<input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageFile(event)">

<!-- Toast -->
<div class="toast" id="toast"></div>

  // ── State ────────────────────────────────────────────────

  function loadDoc() {

      if (raw) {
        doc = JSON.parse(raw);
        if (doc.sections && doc.sections.length > 0) return;

    } catch (e) {}
    // Use default
    doc = JSON.parse(JSON.stringify(DEFAULT_DOC));

  function autoSave() {

  function renderSidebar() {

  function selectSection(id) {
    saveCurrentSection();

    activeSectionId = id;
    const section = doc.sections.find(s => s.id === id);
    if (!section) return;

    document.getElementById('editorEmpty').style.display = 'none';
    document.getElementById('editorPanel').style.display = 'flex';
    document.getElementById('sectionTitle').value = section.title;
    const ce = document.getElementById('contentEditable');
    ce.innerHTML = section.content || '<p><br></p>';

    if (!ce.textContent.trim()) {

    setTimeout(() => {

      const range = document.createRange();
      range.selectNodeContents(ce);

      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }, 50);
  }

  function saveCurrentSection() {
    if (!activeSectionId) return;
    const section = doc.sections.find(s => s.id === activeSectionId);
    if (!section) return;
    section.title = document.getElementById('sectionTitle').value.trim() || '未命名';
    section.content = document.getElementById('contentEditable').innerHTML;
    saveDoc();
    updateSaveStatus();
    renderSidebar();

    if (!activeSectionId) return;
    const section = doc.sections.find(s => s.id === activeSectionId);
    if (!section) return;
    section.title = document.getElementById('sectionTitle').value.trim() || '未命名';
    saveDoc();
    renderSidebar();
  }

  function syncContentToSection() {
    if (!activeSectionId) return;
    const section = doc.sections.find(s => s.id === activeSectionId);
    if (!section) return;
    const ce = document.getElementById('contentEditable');
    section.content = ce.innerHTML;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      saveDoc();
      updateSaveStatus();
      updateWordCount();
    }, 500);
  }

  function onContentChange() { syncContentToSection(); }

  // ── Section CRUD ─────────────────────────────────────────

  function addSection() {
    const id = 's' + Date.now();
    doc.sections.push({
      id,
      title: '新章节',
      content: '<p>在此编写内容...</p>'
    });
    saveDoc();
    renderSidebar();
    selectSection(id);
    showToast('新章节已添加，可直接编辑');
  }

  function deleteSection(id) {
    if (doc.sections.length <= 1) {
      showToast('至少保留一个章节');
      return;
    }
    if (!confirm('确定删除此章节？内容不可恢复。')) return;

    const idx = doc.sections.findIndex(s => s.id === id);
    doc.sections = doc.sections.filter(s => s.id !== id);

    if (activeSectionId === id) {
      const newIdx = Math.min(idx, doc.sections.length - 1);
      activeSectionId = doc.sections[newIdx].id;
    }

    saveDoc();
    renderSidebar();

    if (activeSectionId) {
      selectSection(activeSectionId);
    }
  }

  function moveSection(id, direction) {
    const idx = doc.sections.findIndex(s => s.id === id);
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= doc.sections.length) return;

    const temp = doc.sections[idx];
    doc.sections[idx] = doc.sections[newIdx];
    doc.sections[newIdx] = temp;

    saveDoc();
    renderSidebar();
  }

  // ── Reset ────────────────────────────────────────────────

  function resetDoc() {
    if (!confirm('重置将恢复默认模板内容，当前修改将丢失。确定？')) return;

  function handleImageFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      showToast('请选择图片文件');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showToast('图片不能超过 10MB');
      return;
    }

    showToast('正在处理图片...');
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        // Resize if too large
        const maxW = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // Compress as JPEG (or keep PNG for small images)
        const mime = file.size < 500 * 1024 ? 'image/png' : 'image/jpeg';
        const quality = mime === 'image/jpeg' ? 0.85 : 1;
        const dataUrl = canvas.toDataURL(mime, quality);

        // Insert into contenteditable
        const ce = document.getElementById('contentEditable');
        ce.focus();
        document.execCommand('insertImage', false, dataUrl);

        syncContentToSection();
        showToast('图片已插入（点击图片选中，按 Delete 删除）');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);

    // Reset so same file can be re-selected
    event.target.value = '';
  }

  function insertImageURL() {
    const url = prompt('请输入图片链接地址（URL）：', 'https://');

  function insertVideo() {
    const url = prompt('请输入视频链接：\n\n支持：YouTube、B站(bilibili)、.mp4/.webm 直链', 'https://');
    if (!url || !url.trim()) return;

    const ce = document.getElementById('contentEditable');
    ce.focus();

    let embedHTML = '';
    const u = url.trim();

    // YouTube
    const ytMatch = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/);
    if (ytMatch) {
      embedHTML = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}"
        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen style="width:100%;max-width:640px;aspect-ratio:16/9;border-radius:6px;"></iframe>`;
    }

    // Bilibili
    const blMatch = u.match(/bilibili\.com\/video\/(BV\w+)/);
    if (blMatch) {
      embedHTML = `<iframe src="https://player.bilibili.com/player.html?bvid=${blMatch[1]}&page=1"
        frameborder="0" allowfullscreen style="width:100%;max-width:640px;aspect-ratio:16/9;border-radius:6px;"></iframe>`;
    }

    // Direct video URL (.mp4, .webm, .ogg)
    if (!embedHTML && /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(u)) {
      embedHTML = `<video controls style="max-width:100%;border-radius:6px;" src="${u}"></video>`;
    }

    // Fallback: generic iframe
    if (!embedHTML) {
      embedHTML = `<iframe src="${u}" frameborder="0" allowfullscreen
        style="width:100%;max-width:640px;aspect-ratio:16/9;border-radius:6px;"></iframe>`;
    }

    // Insert at cursor position
    const sel = window.getSelection();
    if (sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const frag = range.createContextualFragment(embedHTML);
      range.insertNode(frag);
      // Move cursor after the inserted element
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      ce.innerHTML += embedHTML;
    }

    // Click-to-select for media
    ce.querySelectorAll('iframe, video').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        ce.querySelectorAll('img.selected,video.selected,iframe.selected').forEach(m => m.classList.remove('selected'));
        el.classList.toggle('selected');
      });
    });

    syncContentToSection();
    showToast('视频已插入（点击视频选中，按 Delete 删除）');

    const section = doc.sections.find(s => s.id === activeSectionId);
    if (!confirm('确定删除章节「' + (section ? section.title : '') + '」？')) return;

    deleteSection(activeSectionId);
  }

  // ── Keyboard shortcuts ───────────────────────────────────

  document.addEventListener('keydown', (e) => {
    // Ctrl+S or Cmd+S to save
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveCurrentSection();
      saveDoc();
      updateSaveStatus();
      showToast('文档已保存');
    }
  });

  // ── Init ─────────────────────────────────────────────────

  function init() {
    loadDoc();
    document.getElementById('docTitle').value = doc.title;
    renderSidebar();

    // Select first section by default
    if (doc.sections.length > 0) {
      selectSection(doc.sections[0].id);
    }

    updateSaveStatus();
  }

  init();
</script>

</body>
</html>
